<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT ATTENDANCE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

  body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
      color: #333;
    }
.app-container {
    max-width: 90%;
    margin: 0 auto;
    margin-top: 10px;
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    padding: 40px;
}
.header-title-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    background-color: #f4f4f4;
}
.header-title-bar h1 {
      text-align: center;
      color: #2c3e50;
      margin: 10px 0;
      text-shadow: 1px 1px #ccc;}


.auth-buttons button {
    margin-left: 10px;
    padding: 8px 15px;
    border: none;
    background-color: #007BFF;
    color: white;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.auth-buttons button:hover {
    background-color: #0056b3;
}

.auth-buttons i {
    margin-right: 6px;
}
.navbar {
  background: #34495e;
  padding: 12px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}
.navbar input, .navbar button {
  padding: 8px;
  margin: 5px;
  border-radius: 15px;
  border: 1px solid #ccc;
}
.navbar button {
  background: #1abc9c;
  color: white;
  border: none;
  cursor: pointer;
}
.navbar button:hover {
  background: #148f76;
}
.navbar2 {
  background: #2c3e50;
  padding: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  border-top-left-radius: 0px;
  border-top-right-radius: 0px;
  border-bottom-left-radius: 15px;
  border-bottom-right-radius: 15px;

}
.navbar2 button  {
  background: #ecf0f1;
  border: none;
  margin: 3px;
  padding: 8px 15px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}
.navbar2 button:hover {
   background: #bdc3c7;
}
.navbar2 button.active {
  background: #e67e22;
  color: white;
}
.summary {
  width: 100%;
  margin: 20px auto;
  display: flex;
  justify-content: space-evenly;
  align-items: center;
  background: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  font-weight: bold;
  border-top: 12px solid rgba(59, 53, 53, 0.384);
}
.summary span{
   box-shadow: 0 2px 5px rgba(0,0,0,0.1);
   padding:10px 20px;
   border-radius: 8px;
  }
.p{
  background-color: #74d69b;
  color:white;
  border-top: 6px solid rgba(23, 120, 52, 0.384);
}
.a{
  background-color:red;
  color:white;
  border-top: 6px solid rgba(120, 23, 23, 0.384);
}
.nm{
  background-color: grey;
  color:white;
  border-top: 6px solid rgba(70, 87, 75, 0.384);
}
.stats {
  display: flex;
  gap: 20px;
}
#chartContainer {
  width: 250px;
  height: 250px;
}
.form-box{
    margin:15px;
    text-align: center;
}
.form-box input, .form-box button {
      padding: 8px;
      margin: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
}
.form-box button {
  background: #3498db;
  color: white;
  border: none;
  cursor: pointer;
}
.form-box button:hover {
  background: #2980b9;
}
table {
  width: 100%;
  margin: 20px auto;
  border-collapse: collapse;
  background: #fff;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
th, td {
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
}
th {
  background: #3498db;
  color: white;
  font-weight: bold;
}
td button {
  padding: 5px 10px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}
td button:hover {
  opacity: 0.8;
}
.present-btn {
  background: #2ecc71;
  color: white;
}
.absent-btn {
  background: #e74c3c;
  color: white;
}
.remove-btn {
  background: #e74c3c;
  color: white;
}
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <header>
         <div class="header-title-bar">
    <h1>STUDENT ATTENDANCE</h1>
    <div class="auth-buttons">
        <button id="logoutBtn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
</div>
            <!-- first navbar -->
            <div class="navbar">
                <input type="text" id="newYear" placeholder="Enter Year (e.g. FE,SE,TE,BE)">
                <input type="text" id="newClass" placeholder="Enter Class (e.g. A,B,C)">
                <input type="text" id="newBatch" placeholder="Enter Batch (e.g. A1,B2,C3)">
                <button onclick="addClass()">
                    <b><i class="fa-solid fa-plus"></i>
                    Add Class & Batch </b>
                </button>
            </div>
            <!-- second-navbar -->
            <div class="navbar2" id="classTabs">
            </div>
        </header>
        <main-body-part>
            <div class="summary">
                  <div class="stats" id="summary">
                    <span class="p">Present: 0</span>
                    <span class="a">Absent: 0</span>
                    <span class="nm">Not Marked: 0</span>
                  </div>
                  <div id="chartContainer">
                    <canvas id="attendanceChart"></canvas>
                  </div>
            </div>
            <div class="form-box">
                <input type="number" id="studentRoll" placeholder="Enter Roll No" min="1">
                <input type="text" id="studentName" placeholder="Enter Student Name">
                <input type="date" id="dateField" onchange="showTable()">
                <button onclick="addStudent()">
                    <b><i class="fa-solid fa-plus"></i>
                   Add Student</b>
                </button>
            </div>
            <table id="attendanceTable">
            <tr>
                <th>Roll No</th>
                <th>Student Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Mark Attendance</th>
                <th>Remove</th>
            </tr>
        </table>
        </main-body-part>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
     <script>
        let currentClassBatch = "";
let data = {};
let chart;
 function logout() {
      window.location.href = "login.html";
    }
// Helper to get element value
const $ = id => document.getElementById(id);

function addClass() {
  const year = $("newYear").value.trim();
  const className = $("newClass").value.trim();
  const batchName = $("newBatch").value.trim();

  if (!year || !className || !batchName) {
    alert("Please fill all fields.");
    return;
  }

  const classBatch = `Std ${year} - ${className} - ${batchName}`;
  if (data[classBatch]) {
    alert("This class+batch already exists!");
    return;
  }

  data[classBatch] = { students: [], attendance: {} };
  currentClassBatch = classBatch;

  addClassTab(classBatch);
  $("newYear").value = $("newClass").value = $("newBatch").value = "";
  showTable();
}

function addClassTab(classBatch) {
  const classTabs = $("classTabs");

  const wrapper = document.createElement("span");
  const btn = document.createElement("button");
  btn.textContent = classBatch;
  btn.onclick = () => {
    currentClassBatch = classBatch;
    document.querySelectorAll(".navbar2 button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showTable();
  };

  const removeBtn = document.createElement("button");
  removeBtn.textContent = "X";
  removeBtn.style.background = "red";
  removeBtn.style.color = "white";
  removeBtn.onclick = () => {
    delete data[classBatch];
    classTabs.removeChild(wrapper);
    if (currentClassBatch === classBatch) {
      currentClassBatch = "";
      showTable();
    }
  };

  wrapper.appendChild(btn);
  wrapper.appendChild(removeBtn);
  classTabs.appendChild(wrapper);
  btn.click(); // auto-select
}

function addStudent() {
  const roll = parseInt($("studentRoll").value);
  const name = $("studentName").value.trim();

  if (!currentClassBatch) return alert("Select a class tab first!");
  if (!roll || !name) return alert("Enter both Roll No and Name");

  const students = data[currentClassBatch].students;

  if (students.some(s => s.rollNo === roll)) {
    return alert("Roll No already exists!");
  }

  students.push({ rollNo: roll, name });
  students.sort((a, b) => a.rollNo - b.rollNo); // sort by roll no

  $("studentRoll").value = $("studentName").value = "";
  showTable();
}

function mark(rollNo, status) {
  const date = $("dateField").value;
  if (!date || !currentClassBatch) return;

  const attendance = data[currentClassBatch].attendance;
  attendance[date] = attendance[date] || {};
  attendance[date][rollNo] = status;

  showTable();
}

function removeStudent(rollNo) {
  if (!currentClassBatch) return;
  const students = data[currentClassBatch].students;

  data[currentClassBatch].students = students.filter(s => s.rollNo !== rollNo);

  // Remove attendance for that rollNo
  for (let date in data[currentClassBatch].attendance) {
    delete data[currentClassBatch].attendance[date][rollNo];
  }

  showTable();
}

function updateSummary() {
  const date = $("dateField").value;
  if (!currentClassBatch || !date) {
    $("summary").innerHTML = summaryHTML(0, 0, 0);
    updateChart(0, 0, 0);
    return;
  }

  const students = data[currentClassBatch].students;
  const attendance = data[currentClassBatch].attendance[date] || {};

  let present = 0, absent = 0, notMarked = 0;
  students.forEach(s => {
    const status = attendance[s.rollNo];
    if (status === "Present") present++;
    else if (status === "Absent") absent++;
    else notMarked++;
  });

  $("summary").innerHTML = summaryHTML(present, absent, notMarked);
  updateChart(present, absent, notMarked);
}

function summaryHTML(p, a, nm) {
  return `
    <span class="p">Present: ${p}</span>
    <span class="a">Absent: ${a}</span>
    <span class="nm">Not Marked: ${nm}</span>
  `;
}

function showTable() {
  const table = $("attendanceTable");
  const date = $("dateField").value;
  table.innerHTML = `
    <tr>
      <th>Roll No</th>
      <th>Student Name</th>
      <th>Status</th>
      <th>Mark Attendance</th>
      <th>Remove</th>
    </tr>
  `;

  if (!currentClassBatch || !date) {
    updateSummary();
    return;
  }

  const students = data[currentClassBatch].students;
  const attendance = data[currentClassBatch].attendance[date] || {};

  students.sort((a, b) => a.rollNo - b.rollNo);

  students.forEach(s => {
    const row = table.insertRow();
    row.innerHTML = `
      <td>${s.rollNo}</td>
      <td>${s.name}</td>
      <td>${attendance[s.rollNo] || "Not Marked"}</td>
      <td>
        <button class="present-btn" onclick="mark(${s.rollNo}, 'Present')">Present</button>
        <button class="absent-btn" onclick="mark(${s.rollNo}, 'Absent')">Absent</button>
      </td>
      <td><button class="remove-btn" onclick="removeStudent(${s.rollNo})">Remove</button></td>
    `;
  });

  updateSummary();
}

function updateChart(present, absent, notMarked) {
  const ctx = $("attendanceChart").getContext("2d");
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['Present', 'Absent', 'Not Marked'],
      datasets: [{
        data: [present, absent, notMarked],
        backgroundColor: ['#2ecc71', '#e74c3c', '#95a5a6']
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'right' },
        title: { display: false }
      }
    }
  });
}

     </script>
</body>
</html>
